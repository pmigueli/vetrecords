services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - uploads:/home/appuser/uploads
      - db_data:/home/appuser/data
    env_file: .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads:
  db_data:
